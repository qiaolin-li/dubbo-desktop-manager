name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --win nsis --x64
            artifact: windows-x64
          - name: macOS Intel
            os: macos-15-intel
            args: --mac dmg zip --x64
            artifact: macos-intel
          - name: macOS Apple Silicon
            os: macos-15
            args: --mac dmg zip --arm64
            artifact: macos-arm64
          - name: Linux x64
            os: ubuntu-latest
            args: --linux AppImage deb --x64
            artifact: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build source
        run: yarn electron-vite build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn electron-builder ${{ matrix.args }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist_electron/**
          if-no-files-found: error
